<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hzz - 管理后台 - 首页</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="/admin/lib/js/echarts.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* PC端侧边栏收起状态 */
    @media (min-width: 640px) {
      #aside.closed {
        transform: translateX(-100%);
      }
    }
  </style>
</head>

<body class="bg-gray-100">
  <div class="flex flex-col h-screen">
    <!-- 顶部导航（固定高度防止布局跳动）-->
    <header class="h-16 bg-white shadow-sm">
      <div id="topBar"></div>
    </header>


    <!-- 主内容区 -->
    <div class="flex-1 flex overflow-hidden relative">

      <!-- 遮罩层（抽屉打开时显示，不覆盖顶部导航）-->
      <div id="drawer-overlay" class="fixed top-16 left-0 right-0 bottom-0 bg-black bg-opacity-50 z-40 hidden"></div>

      <!-- 侧边栏（PC端始终展开，移动端默认隐藏作为抽屉）-->
      <aside id="aside"
        class="fixed top-16 left-0 h-[calc(100vh-4rem)] bg-gradient-to-b from-white to-gray-100 text-gray-800 w-[200px] z-50 transition-transform duration-300 -translate-x-full sm:translate-x-0 border-r border-gray-200">
      </aside>

      <!-- 内容区域 -->
      <main class="flex-1 overflow-auto p-4 sm:p-6 sm:ml-[200px]">
        <div class=" sm:px-12 min-w-[320px] mx-auto py-6 sm:py-10">
          <!-- 面包屑导航 -->
          <nav class="breadcrumb mb-6">
            <ol class="flex items-center border-l-2 border-gray-400">
              <li class="breadcrumb-item px-2">首页</li>
            </ol>
          </nav>
          <section>
            <div class="user-info flex items-center bg-white p-6 rounded-xl shadow-sm gap-4 my-8"></div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
              <!-- 产品分类图表 -->
              <div class="bg-white rounded-xl shadow-sm p-6">
                <h3 class="text-lg font-semibold text-gray-800 mb-4">产品分类统计</h3>
                <div id="productChart" style="width: 100%;height:400px;"></div>
              </div>
              <!-- 文章分类图表 -->
              <div class="bg-white rounded-xl shadow-sm p-6">
                <h3 class="text-lg font-semibold text-gray-800 mb-4">文章分类统计</h3>
                <div id="articleChart" style="width: 100%;height:400px;"></div>
              </div>
            </div>
          </section>

        </div>
      </main>
    </div>
  </div>

  <script src="./index.js" type="module"></script>
</body>

</html>
