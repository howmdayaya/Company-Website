<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hzz - 管理后台 - 首页</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    /* PC端侧边栏收起状态 */
    @media (min-width: 640px) {
      #aside.closed {
        transform: translateX(-100%);
      }
    }
  </style>
</head>

<body class="bg-gray-100">
  <div class="flex flex-col h-screen">
    <!-- 顶部导航（固定高度防止布局跳动）-->
    <header class="h-16 bg-white shadow-sm">
      <div id="topBar"></div>
    </header>


    <!-- 主内容区 -->
    <div class="flex-1 flex overflow-hidden relative">

      <!-- 遮罩层（抽屉打开时显示，不覆盖顶部导航）-->
      <div id="drawer-overlay" class="fixed top-16 left-0 right-0 bottom-0 bg-black bg-opacity-50 z-40 hidden"></div>

      <!-- 侧边栏抽屉（PC端默认展开，移动端默认隐藏）-->
      <aside id="aside" class="fixed top-16 left-0 h-[calc(100vh-4rem)] bg-gradient-to-b from-white to-gray-100 text-gray-800 min-w-[200px] z-50 transition-transform duration-300 -translate-x-full sm:translate-x-0 border-r border-gray-200"></aside>

      <!-- 内容区域 -->
      <main class="flex-1 overflow-auto p-4 sm:p-6 sm:ml-[200px]">
        <div class="min-w-[320px] mx-auto py-4 sm:py-6">
          <!-- 面包屑导航 -->
          <nav class="breadcrumb mb-6">
            <ol class="flex items-center border-l-2 border-gray-400">
              <li class="breadcrumb-item px-2">产品管理</li>/
              <li class="breadcrumb-item px-2">产品列表</li>
            </ol>
          </nav>
          <section>
            <!-- 搜索和添加按钮区域 -->
            <div class="flex flex-col sm:flex-row gap-4 mb-6">
              <div class="relative flex-1">
                <input type="text" placeholder="搜索关键词..." id="searchKeyword"
                  class="w-full px-4 py-2.5 pl-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
              </div>
              <!-- 分类筛选 -->
              <div class="w-full sm:w-48">
                <select id="articleCategory" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all appearance-none bg-white">
                  <option value="">全部分类</option>
                  <!-- 动态生成分类选项 -->
                </select>
              </div>

              <a href="/admin/views/product-manage/addProduct/index.html" 
                class="inline-flex items-center justify-center px-6 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-medium">
                <i class="fas fa-plus mr-2"></i>
                添加产品
              </a>
            </div>

            <!-- 产品列表 -->
            <div id="productList" class="space-y-4">
              <!-- 产品卡片 -->
              <article class="bg-white rounded-xl shadow-sm hover:shadow-md transition-all p-4 sm:p-6">
                <div class="flex flex-col sm:flex-row gap-4 sm:gap-6">
                  <!-- 产品缩略图 -->
                  <div class="w-full sm:w-48 h-32 sm:h-32 rounded-lg overflow-hidden flex-shrink-0 bg-gradient-to-br from-blue-400 to-blue-600">
                    <img src="https://picsum.photos/400/300?random=1" alt="产品封面" class="w-full h-full object-cover">
                  </div>
                  
                  <!-- 产品内容 -->
                  <div class="flex-1 min-w-0">
                    <div class="flex items-start justify-between gap-2 sm:gap-4">
                      <h3 class="text-base sm:text-lg font-semibold text-gray-800 hover:text-blue-600 cursor-pointer truncate">
                        深入理解 JavaScript 异步编程
                      </h3>
                      <span class="px-2 sm:px-3 py-0.5 sm:py-1 text-xs font-medium text-blue-600 bg-blue-50 rounded-full flex-shrink-0 whitespace-nowrap">
                        技术文章
                      </span>
                    </div>
                    <p class="text-gray-500 text-sm mt-2 line-clamp-2">
                      本文详细介绍了 JavaScript 中的异步编程概念，包括回调函数、Promise、async/await 等多种异步处理方式。
                    </p>
                    <div class="flex items-center justify-between mt-3 sm:mt-4 text-xs sm:text-sm text-gray-400">
                      <div class="flex flex-wrap items-center gap-x-3 sm:gap-x-4 gap-y-1">
                        <span class="flex items-center gap-1">
                          <i class="fas fa-user"></i>
                          <span class="whitespace-nowrap">管理员</span>
                        </span>
                        <span class="flex items-center gap-1">
                          <i class="fas fa-calendar"></i>
                          <span class="whitespace-nowrap">2024-01-15</span>
                        </span>
                        <span class="flex items-center gap-1">
                          <i class="fas fa-eye"></i>
                          <span class="whitespace-nowrap">1256</span>
                        </span>
                      </div>
                      <div class="flex items-center gap-2">
                        <button class="edit-btn p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-lg transition-colors" data-id="1">
                          <i class="fas fa-edit"></i>
                        </button>
                        <button class="delete-btn p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors" data-id="1" data-title="深入理解 JavaScript 异步编程">
                          <i class="fas fa-trash"></i>
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              </article>

            </div>

            <!-- 分页区域 -->
            <div class="flex items-center justify-center mt-8">
              <nav class="inline-flex rounded-lg shadow-sm" aria-label="Pagination" id="pagination">
                <!-- 动态生成分页按钮 -->
              </nav>
            </div>

          </section>
          <!-- 预览模态框遮罩层 -->
          <div id="previewOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4"></div>
          
          <!-- 预览模态框 -->
          <div id="previewModal" class="fixed top-1/2 -translate-y-1/2 left-1/2 -translate-x-1/2 z-50 hidden flex items-center justify-center p-4">
            <div class="bg-white rounded-xl shadow-2xl max-w-3xl w-full max-h-[90vh] overflow-hidden transition-all duration-300 ease-out opacity-0">
              <!-- 模态框头部 -->
              <div class="flex items-center justify-between p-4 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-gray-800">产品预览</h3>
                <button id="closePreviewBtn" class="p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">
                  <i class="fas fa-times"></i>
                </button>
              </div>
              
              <!-- 模态框内容 -->
              <div id="previewContent" class="p-6 overflow-y-auto max-h-[calc(90vh-80px)]">
                <!-- 产品详情将在这里动态渲染 -->
              </div>
            </div>
          </div>
          
        </div>
      </main>
    </div>
  </div>

  <script src="./index.js" type="module"></script>
</body>

</html>
