<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hzz - 管理后台 - 用户列表</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* PC端侧边栏收起状态 */
    @media (min-width: 640px) {
      #aside.closed {
        transform: translateX(-100%);
      }
    }
  </style>
</head>

<body class="bg-gray-100">
  <div class="flex flex-col h-screen">
    <!-- 顶部导航（固定高度防止布局跳动）-->
    <header class="h-16 bg-white shadow-sm">
      <div id="topBar"></div>
    </header>


    <!-- 主内容区 -->
    <div class="flex-1 flex overflow-hidden relative">

      <!-- 遮罩层（抽屉打开时显示，不覆盖顶部导航）-->
      <div id="drawer-overlay" class="fixed top-16 left-0 right-0 bottom-0 bg-black bg-opacity-50 z-40 hidden"></div>

      <!-- 侧边栏抽屉（PC端默认展开，移动端默认隐藏）-->
      <aside id="aside"
        class="fixed top-16 left-0 h-[calc(100vh-4rem)] bg-gradient-to-b from-white to-gray-100 text-gray-800 min-w-[200px] z-50 transition-transform duration-300 -translate-x-full sm:translate-x-0 border-r border-gray-200">
      </aside>

      <!-- 内容区域 -->
      <main class="flex-1 overflow-auto p-6 sm:ml-[200px]">
        <div class="sm:px-12 min-w-[320px] mx-auto py-6 sm:py-10">
          <!-- 面包屑导航 -->
          <nav class="breadcrumb mb-6">
            <ol class="flex items-center border-l-2 border-gray-400">
              <li class="breadcrumb-item px-2">用户管理</li>/
              <li class="breadcrumb-item px-2">用户列表</li>
            </ol>
          </nav>
          <section>
            <div class="user-list">
              <!-- 列表标题栏 -->
              <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-semibold text-gray-800">
                  <i class="fas fa-users mr-2 text-blue-500"></i>用户列表
                </h2>
                <span id="userCount" class="text-sm text-gray-500">共 3 个用户</span>
              </div>

              <!-- 用户卡片列表 -->
              <div id="userList" class="space-y-3">
                <!-- 用户卡片区  -->

              </div>

              <!-- 响应式模态框 -->
              <!-- 遮罩层 -->
              <div id="editModalOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4 hidden">
                <!-- 模态框内容 -->
                <div id="editModal" class="bg-white rounded-xl shadow-xl w-full max-w-md transform transition-all duration-300">
                  <!-- 头部 -->
                  <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
                    <h3 class="text-lg font-semibold text-gray-800" id="modalTitle">编辑用户</h3>
                    <button id="closeModal" class="p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">
                      <i class="fas fa-times"></i>
                    </button>
                  </div>
                  
                  <!-- 表单内容 -->
                  <form id="editUserForm" class="p-6">
                    <input type="hidden" id="userId" name="userId">
                    <div class="space-y-5">
                      <div>
                        <label for="username" class="block text-sm font-medium text-gray-700 mb-2">用户名</label>
                        <input type="text" id="username" name="username"
                          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all duration-200"
                          placeholder="请输入用户名" required>
                      </div>

                      <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">密码</label>
                        <input type="password" id="password" name="password"
                          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all duration-200"
                          placeholder="请输入密码（留空则不修改）">
                      </div>

                      <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">邮箱</label>
                        <input type="email" id="email" name="email"
                          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all duration-200"
                          placeholder="请输入邮箱">
                      </div>

                      <div>
                        <label for="photo" class="block text-sm font-medium text-gray-700 mb-2">用户头像</label>
                        <input type="file" id="photo" name="photo" accept="image/*"
                          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all duration-200">
                      </div>

                      <!-- 按钮组 -->
                      <div class="flex gap-3">
                        <button type="button" id="cancelBtn"
                          class="flex-1 bg-gray-100 text-gray-700 py-2.5 px-4 rounded-lg font-medium hover:bg-gray-200 transition-colors">
                          取消
                        </button>
                        <button type="submit" id="saveUserBtn"
                          class="flex-1 bg-blue-600 text-white py-2.5 px-4 rounded-lg font-medium hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-200 flex items-center justify-center">
                          <span id="btnText">更新</span>
                          <svg id="loadingSpinner" class="animate-spin -ml-1 mr-3 h-4 w-4 text-white hidden"
                            xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                          </svg>
                        </button>
                      </div>
                    </div>
                  </form>
                </div>
              </div>

              <!-- 分页区域（预留，未启用）-->
              <div class="flex items-center justify-center gap-2 mt-6">
                <button
                  class="px-3 py-1 text-sm text-gray-500 hover:text-blue-500 disabled:text-gray-300 transition-colors"
                  disabled>
                  <i class="fas fa-chevron-left mr-1"></i>上一页
                </button>
                <span class="px-3 py-1 text-sm bg-blue-500 text-white rounded">1</span>
                <button
                  class="px-3 py-1 text-sm text-gray-500 hover:text-blue-500 disabled:text-gray-300 transition-colors"
                  disabled>
                  下一页<i class="fas fa-chevron-right ml-1"></i>
                </button>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <script src="./index.js" type="module"></script>
</body>

</html>
