<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hzz - 管理后台 - 首页</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* PC端侧边栏收起状态 */
    @media (min-width: 640px) {
      #aside.closed {
        transform: translateX(-100%);
      }
    }
  </style>
</head>

<body class="bg-gray-100">
  <div class="flex flex-col h-screen">
    <!-- 顶部导航（固定高度防止布局跳动）-->
    <header class="h-16 bg-white shadow-sm">
      <div id="topBar"></div>
    </header>


    <!-- 主内容区 -->
    <div class="flex-1 flex overflow-hidden relative">

      <!-- 遮罩层（抽屉打开时显示，不覆盖顶部导航）-->
      <div id="drawer-overlay" class="fixed top-16 left-0 right-0 bottom-0 bg-black bg-opacity-50 z-40 hidden"></div>

      <!-- 侧边栏抽屉（PC端默认展开，移动端默认隐藏）-->
      <aside id="aside"
        class="fixed top-16 left-0 h-[calc(100vh-4rem)] bg-gradient-to-b from-white to-gray-100 text-gray-800 min-w-[200px] z-50 transition-transform duration-300 -translate-x-full sm:translate-x-0 border-r border-gray-200">
      </aside>

      <!-- 内容区域 -->
      <main class="flex-1 overflow-auto p-6 sm:ml-[200px]">
        <div class="sm:px-12 min-w-[320px] mx-auto py-6 sm:py-10">
          <!-- 面包屑导航 -->
          <nav class="breadcrumb mb-6">
            <ol class="flex items-center border-l-2 border-gray-400">
              <li class="breadcrumb-item px-2">用户管理</li>/
              <li class="breadcrumb-item px-2">添加用户</li>
            </ol>
          </nav>
          <section>
            <div class=" flex flex-col gap-10">
              <h2 class="text-xl font-semibold text-gray-800">添加用户</h2>
              <form id="addUserForm">
                <div class="space-y-5">
                  <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-2">用户名</label>
                    <input type="text" id="username" name="username"
                      class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all duration-200"
                      placeholder="请输入用户名" required>
                  </div>

                  <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">密码</label>
                    <input type="password" id="password" name="password"
                      class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all duration-200"
                      placeholder="请输入密码" required>
                  </div>

                  <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">邮箱</label>
                    <input type="email" id="email" name="email"
                      class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all duration-200"
                      placeholder="请输入邮箱" required>
                  </div>
         
                  <div>
                    <label for="photo" class="block text-sm font-medium text-gray-700 mb-2">用户头像</label>
                    <input type="file" id="photo" name="photo"
                      class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all duration-200"
                      placeholder="请上传用户头像" required>
                  </div>

                  <button type="submit" id="addUserBtn"
                    class="w-full bg-blue-600 text-white py-3 px-4 rounded-lg font-medium hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-200 flex items-center justify-center">
                    <span id="btnText">添加用户</span>
                    <svg id="loadingSpinner" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white hidden"
                      xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                      <path class="opacity-75" fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                      </path>
                    </svg>
                  </button>
                </div>
              </form>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <script src="./index.js" type="module"></script>
</body>

</html>
