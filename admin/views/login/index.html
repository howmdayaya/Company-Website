<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hzz - 管理后台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <style>
    @keyframes slideDown {
      from {
        transform: translateY(-100%);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
    @keyframes slideUp {
      from {
        transform: translateY(0);
        opacity: 1;
      }
      to {
        transform: translateY(-100%);
        opacity: 0;
      }
    }
    .toast-show {
      animation: slideDown 0.3s ease-out;
    }
    .toast-hide {
      animation: slideUp 0.3s ease-out;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md min-w-[300px]">
    <div class="bg-white rounded-2xl shadow-xl p-8">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-800">hzz 管理后台</h1>
        <p class="text-gray-500 mt-2">请登录以继续</p>
      </div>

      <form id="loginForm">
        <div class="space-y-5">
          <div>
            <label for="username" class="block text-sm font-medium text-gray-700 mb-2">用户名</label>
            <input
              type="text"
              id="username"
              name="username"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all duration-200"
              placeholder="请输入用户名"
              required
            >
          </div>

          <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-2">密码</label>
            <input
              type="password"
              id="password"
              name="password"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all duration-200"
              placeholder="请输入密码"
              required
            >
          </div>

          <button
            type="submit"
            id="loginBtn"
            class="w-full bg-blue-600 text-white py-3 px-4 rounded-lg font-medium hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-200 flex items-center justify-center"
          >
            <span id="btnText">登录</span>
            <svg id="loadingSpinner" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
          </button>
        </div>
      </form>

      <div class="mt-8 pt-6 border-t border-gray-100 text-center text-sm text-gray-500">
        <p>© 2026 hzz 管理后台. All rights reserved.</p>
      </div>

      <!-- Toast 提示 -->
      <div
        id="toast"
        style="display: none;"
        class="fixed top-5 left-1/2 -translate-x-1/2 z-50 rounded-lg shadow-xl px-6 py-4 flex items-center bg-white"
      >
        <svg id="successIcon" class="w-6 h-6 mr-3 text-green-500 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
        <svg id="errorIcon" class="w-6 h-6 mr-3 text-red-500 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <div>
          <h3 id="toastTitle" class="font-semibold"></h3>
          <p id="toastMessage" class="text-gray-600 text-sm"></p>
        </div>
      </div>
    </div>
  </div>

  <script>
    $(document).ready(function() {
      let redirectTimer = null;

      // 显示 Toast
      function showToast(type, title, message) {
        const $toast = $('#toast');
        const $successIcon = $('#successIcon');
        const $errorIcon = $('#errorIcon');
        const $toastTitle = $('#toastTitle');

        // 设置图标和标题颜色
        if (type === 'success') {
          $successIcon.removeClass('hidden');
          $errorIcon.addClass('hidden');
          $toastTitle.removeClass('text-red-700').addClass('text-green-700');
        } else {
          $successIcon.addClass('hidden');
          $errorIcon.removeClass('hidden');
          $toastTitle.removeClass('text-green-700').addClass('text-red-700');
        }

        // 设置内容
        $('#toastTitle').text(title);
        $('#toastMessage').text(message);

        // 显示 Toast
        $toast.removeClass('toast-hide').addClass('toast-show').show();

        // 2秒后隐藏
        setTimeout(function() {
          $toast.removeClass('toast-show').addClass('toast-hide');
          setTimeout(function() {
            $toast.hide();
          }, 300);
        }, 2000);
      }

      // 获取输入值
      function getInputValues() {
        return {
          username: $('#username').val() || '',
          password: $('#password').val() || ''
        };
      }

      // 设置加载状态
      function setLoading(isLoading) {
        const $btn = $('#loginBtn');
        const $btnText = $('#btnText');
        const $spinner = $('#loadingSpinner');

        if (isLoading) {
          $btn.prop('disabled', true);
          $btnText.text('验证中...');
          $spinner.removeClass('hidden');
        } else {
          $btn.prop('disabled', false);
          $btnText.text('登录');
          $spinner.addClass('hidden');
        }
      }

      // 登录表单提交
      $('#loginForm').on('submit', async function(e) {
        e.preventDefault();

        // 清除之前的定时器
        if (redirectTimer) {
          clearTimeout(redirectTimer);
        }

        const { username, password } = getInputValues();

        setLoading(true);

        console.log('=== 开始登录验证 ===');
        console.log('输入的用户名:', username);
        console.log('输入的密码:', password);

        try {
          const response = await fetch('http://localhost:5050/users');
          const users = await response.json();
          console.log('从服务器获取的用户列表:', users);

          const matchedUser = users.find(user =>
            user.username === username && user.password === password
          );

          console.log('验证结果:');

          if (matchedUser) {
            console.log('✅ 登录成功！');
            console.log('匹配的用户信息:', matchedUser);

            // 保存登录 token 到本地存储
            const tokenData = { ...matchedUser, password: '******' };
            localStorage.setItem('token', JSON.stringify(tokenData));

            console.log('========================');
            showToast('success', '登录成功', '欢迎 ' + matchedUser.username);

            // 登录成功后，2秒后跳转到首页
            redirectTimer = setTimeout(function() {
              window.location.href = '/admin/views/home/index.html';
            }, 2000);

          } else {
            console.log('❌ 登录失败：用户名或密码错误');
            console.log('========================');
            showToast('error', '登录失败', '用户名或密码错误');
          }
        } catch (error) {
          console.error('❌ 请求失败:', error);
          console.log('========================');
          showToast('error', '请求失败', '服务器请求失败，请确保 json-server 已启动');
        }

        setLoading(false);
      });
    });
  </script>
</body>
</html>
