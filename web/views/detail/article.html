<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章详情 - HZZ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@6.5.1/css/all.min.css">

</head>

<body class="bg-theme">
  <header class="bg-white shadow-sm">
    <div id="topBar"></div>
  </header>


  <!-- 主内容区 -->
  <main>
    <!-- hero -->
    <div id="hero" data-config='{"title":"文章详情","breadcrumb":"文章详情","subtitle":"探索我们的故事，了解我们的使命"}'></div>

    <!-- 文章详情 -->
    <section class="py-12">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <!-- 文章详情容器 - 由JavaScript动态渲染 -->
        <article id="articleDetail" class="bg-white rounded-xl shadow-md overflow-hidden">
          <!-- 加载状态 -->
          <div class="text-center py-12">
            <i class="fas fa-spinner fa-spin text-4xl text-[#4a6723] mb-4"></i>
            <p class="text-gray-500">加载中...</p>
          </div>
        </article>

        <!-- 相关推荐 -->
        <div id="relatedArticles" class="mt-12">
          <h3 class="text-xl font-bold text-[#2c3a32] mb-6 flex items-center gap-2">
            <i class="fas fa-newspaper text-[#4a6723]"></i>
            相关文章
          </h3>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- 相关文章由JavaScript动态渲染 -->
          </div>
        </div>
      </div>
    </section>

  </main>

  <footer>
    <div id="footer"></div>
  </footer>

  <script src="./article.js" type="module"></script>
</body>

</html>
