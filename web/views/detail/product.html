<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>产品详情 - HZZ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@6.5.1/css/all.min.css">
  <style>
    .product-title {
      font-family: 'Microsoft YaHei', sans-serif;
    }
  </style>
</head>

<body class="bg-theme">
  <header class="bg-white shadow-sm">
    <div id="topBar"></div>
  </header>


  <!-- 主内容区 -->
  <main>
    <!-- hero -->
    <div id="hero" data-config='{"title":"产品详情","breadcrumb":"产品详情","subtitle":"探索我们的产品，了解产品的价值"}'></div>

    <!-- 产品详情 -->
    <section class="py-12">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

        <!-- 产品主信息区 -->
        <div id="productDetail" class="bg-white rounded-2xl shadow-lg overflow-hidden p-8 lg:p-12">
          <!-- 加载状态 -->
          <div class="text-center py-12">
            <i class="fas fa-spinner fa-spin text-4xl text-[#4a6723] mb-4"></i>
            <p class="text-gray-500">加载中...</p>
          </div>
        </div>

        <!-- 产品介绍区 -->
        <div id="productIntro" class="mt-12">
          <!-- 核心定位与适用场景 -->
          <div class="text-center mb-8">
            <h3 class="text-2xl font-bold text-[#2c3a32] mb-2">核心定位与适用场景</h3>
            <div class="w-16 h-0.5 bg-[#4a6723] mx-auto"></div>
          </div>

          <!-- 产品介绍卡片  -->
          <div class="max-w-7xl mx-auto">
            <div class="bg-white  p-8 lg:p-12">
              
              <!-- 产品详细介绍 -->
              <div id="productDescription" class="prose max-w-none">
                <!-- 由JavaScript动态渲染 -->
              </div>

              
            </div>
          </div>
        </div>


        <!-- 相关产品推荐 -->
        <div id="relatedProducts" class="mt-12">
          <div class="text-center mb-8">
            <h3 class="text-2xl font-bold text-[#2c3a32] mb-2">相关产品</h3>
            <div class="w-16 h-0.5 bg-[#4a6723] mx-auto"></div>
          </div>

          <div id="relatedProductsList" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- 由JavaScript动态渲染 -->
          </div>
        </div>

      </div>
    </section>

  </main>

  <footer>
    <div id="footer"></div>
  </footer>

  <script src="./product.js" type="module"></script>
</body>

</html>
